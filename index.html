<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaxiimTech Aerospace</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #eaf6ff;
  color: #0a2540;
  overflow-x: hidden;
}

/* BACKGROUND CONTAINER */
.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

/* SLIDES */
.bg-slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  animation: fade 24s infinite;
}

/* IMAGE ASSIGNMENT */
.bg-slide:nth-child(1) { background-image: url('image.png'); animation-delay: 0s; }
.bg-slide:nth-child(2) { background-image: url('image1.png'); animation-delay: 6s; }
.bg-slide:nth-child(3) { background-image: url('image2.png'); animation-delay: 12s; }
.bg-slide:nth-child(4) { background-image: url('image3.png'); animation-delay: 18s; }

/* FADE ANIMATION */
@keyframes fade {
  0% { opacity: 0; }
  5% { opacity: 1; }
  25% { opacity: 1; }
  30% { opacity: 0; }
  100% { opacity: 0; }
}

/* LIGHT OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.75);
  z-index: -1;
}

/* NAVBAR */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.9);
  z-index: 10;
}

nav a {
  margin-left: 15px;
  text-decoration: none;
  color: #333;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 60px;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
}

/* MOBILE FIX */
@media(max-width:768px){
  .hero h1 {
    font-size: 24px;
  }
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<div class="background">
  <div class="bg-slide"></div>
  <div class="bg-slide"></div>
  <div class="bg-slide"></div>
  <div class="bg-slide"></div>
</div>

<div class="overlay"></div>

<!-- NAVBAR -->
<header>
  <div><strong>MAXIIMTECH</strong></div>
  <nav>
    <a href="#about">About</a>
    <a href="#technology">Technology</a>
    <a href="#product">Product</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Autonomous Aerospace Systems</h1>
    <p>AI-driven UAV Platforms</p>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h2>About</h2>
  <p>Next-generation UAV systems.</p>
</section>

<!-- TECHNOLOGY -->
<section id="technology" class="section">
  <h2>Technology</h2>
  <p>Advanced AI + Aerospace integration.</p>
</section>

<!-- PRODUCT -->
<section id="product" class="section">
  <h2>Product</h2>
  <p>MX-1 UAV Platform</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact</h2>
  <p>ceomd@maxiimtech.com</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 MaxiimTech Aerospace</p>
</footer>

</body>
</html>
