<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaxiimTech Aerospace</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#eaf6ff;color:#0a2540;overflow-x:hidden}

/* BACKGROUND */
.background{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2}
.bg-slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;animation:fade 24s infinite}
.bg-slide:nth-child(1){background:url('image.png');animation-delay:0s}
.bg-slide:nth-child(2){background:url('image1.png');animation-delay:6s}
.bg-slide:nth-child(3){background:url('image2.png');animation-delay:12s}
.bg-slide:nth-child(4){background:url('image3.png');animation-delay:18s}
@keyframes fade{0%{opacity:0}5%{opacity:1}25%{opacity:1}30%{opacity:0}100%{opacity:0}}

.overlay{position:fixed;width:100%;height:100%;background:rgba(255,255,255,0.75);z-index:-1}

/* NAVBAR */
header{position:fixed;width:100%;background:#fff;padding:15px;display:flex;justify-content:space-between;z-index:10}
nav ul{list-style:none;display:flex}
nav li{position:relative}
nav a{padding:10px;text-decoration:none;color:#333}

/* DROPDOWN */
.dropdown-content{
  display:none;
  position:absolute;
  background:white;
  top:40px;
  min-width:150px;
}
.dropdown-content a{display:block}
nav li:hover .dropdown-content{display:block}

/* HERO */
.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:40px}

/* ANIMATION */
.fade{opacity:0;transform:translateY(30px);transition:1s}
.show{opacity:1;transform:translateY(0)}

.section{padding:80px;text-align:center}
</style>
</head>

<body>

<div class="background">
<div class="bg-slide"></div>
<div class="bg-slide"></div>
<div class="bg-slide"></div>
<div class="bg-slide"></div>
</div>

<div class="overlay"></div>

<header>
<div><b>MAXIIMTECH</b></div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>

<li>
<a href="#">Technology ▼</a>
<div class="dropdown-content">
<a href="technology.html">AI Systems</a>
<a href="technology.html">Autonomy</a>
</div>
</li>

<li>
<a href="#">Products ▼</a>
<div class="dropdown-content">
<a href="product.html">MX-1 UAV</a>
</div>
</li>

<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div>
<h1>Autonomous Aerospace Systems</h1>
<p>AI-driven UAV Platforms</p>
</div>
</section>

<section class="section fade">
<h2>Welcome to MaxiimTech</h2>
<p>Next-gen UAV innovation.</p>
</section>

<script>
const items=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
items.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add('show');
}
});
});
</script>

</body>
</html>
